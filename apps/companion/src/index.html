<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LuminaDeck Companion</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0D0D0D;
      color: #E0E0E0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding: 24px;
    }
    h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #888;
      font-size: 13px;
      margin-bottom: 32px;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: #1A1A2E;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4CAF50;
    }
    .status-dot.waiting { background: #FFC107; }
    .status-dot.error { background: #F44336; }
    .section {
      margin-bottom: 24px;
    }
    .section-title {
      font-size: 13px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .device-list {
      list-style: none;
    }
    .device-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: #1A1A2E;
      border-radius: 8px;
      margin-bottom: 8px;
    }
    .device-name { font-weight: 500; }
    .device-status { font-size: 12px; color: #888; }
    .empty-state {
      text-align: center;
      padding: 40px 16px;
      color: #666;
    }
    .port-info {
      font-size: 12px;
      color: #666;
      margin-top: auto;
      padding-top: 24px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>LuminaDeck Companion</h1>
  <p class="subtitle">Waiting for iPhone connection...</p>

  <div class="status">
    <div class="status-dot waiting"></div>
    <span id="server-status">Server starting...</span>
  </div>

  <div class="section">
    <div class="section-title">Paired Devices</div>
    <div id="device-list" class="empty-state">
      No devices paired yet.<br/>
      Scan the QR code from your iPhone to connect.
    </div>
  </div>

  <div class="port-info">
    Listening on port <strong>9876</strong> (TLS)
  </div>

  <script type="module">
    const { invoke } = window.__TAURI__.core;

    async function updateStatus() {
      try {
        const status = await invoke('get_server_status');
        const el = document.getElementById('server-status');
        const dot = document.querySelector('.status-dot');
        if (status === 'running') {
          el.textContent = 'Server running — ready for connections';
          dot.className = 'status-dot';
        }
      } catch (e) {
        console.error('Status check failed:', e);
      }
    }

    // Poll status
    updateStatus();
    setInterval(updateStatus, 5000);
  </script>
</body>
</html>
